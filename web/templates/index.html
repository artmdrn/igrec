{{template "head" .}}
<main class="feed" aria-label="public firehose">
  {{range .Posts}}
    <article class="word {{if .HasImage}}word-photo{{end}}">
      <a class="said" href="/@{{.Username}}">@{{.Username}}</a>
      {{if .HasImage}}
        <a class="photo" href="/@{{.Username}}/{{.Word}}">
          <img src="{{.ImageURL.String}}" alt="" style="{{.FocusCSS}}">
          <span class="value caption" style="{{.CaptionCSS}}">{{.Word}}</span>
        </a>
        <time>{{.CreatedAt.Format "2006-01-02 15:04"}}</time>
      {{else}}
        <a class="value" href="/@{{.Username}}/{{.Word}}">{{.Word}}</a>
        <time>{{.CreatedAt.Format "2006-01-02 15:04"}}</time>
      {{end}}
    </article>
  {{else}}
    <section class="empty empty-prompt">
      <p>&gt;_</p>
      <a href="/write">write</a>
    </section>
  {{end}}
  {{if .MoreHref}}
    <a class="pager" href="{{.MoreHref}}">older</a>
  {{end}}
</main>
{{template "foot" .}}
