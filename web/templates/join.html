{{template "head" .}}
<main class="settings auth">
  <header class="auth-head">
    <p class="settings-kicker">join</p>
    <h1>pick a handle</h1>
    <p class="muted">your invite gets you a home at igrec.net: one word at a time, followable from the whole fediverse.</p>
  </header>
  <form method="post" action="/join">
    {{if .Error}}<p class="error system-message">{{.Error}}</p>{{end}}
    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
    <label>invite <input name="invite" value="{{.Invite}}" required></label>
    <label>handle
      <span class="handle-input">
        <input name="username" value="{{.Username}}" pattern="@?[A-Za-z0-9_]{1,32}(@igrec\\.net)?" autocomplete="username" required>
        <b>@igrec.net</b>
      </span>
    </label>
    <label>email <input type="email" name="email" value="{{.Email}}" autocomplete="email" required></label>
    <button type="submit">join</button>
  </form>
  <p class="muted auth-foot">curious first? read <a href="/about">what igrec is</a>.</p>
</main>
{{template "foot" .}}
