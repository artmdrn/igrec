{{template "head" .}}
<main class="write">
  <form method="post" action="/write" enctype="multipart/form-data" class="compose" data-compose>
    {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
    <input name="word" value="{{.Word}}" maxlength="50" autocomplete="off" autofocus required aria-label="word">
    <section class="compose-photo">
      <label class="upload-input">
        image
        <input name="image_file" type="file" accept="image/jpeg,image/png" data-image-file>
      </label>
      <div class="compose-preview" data-preview-wrap>
        <img alt="" data-preview-image hidden>
        <button type="button" class="focus-pin" data-focus-pin hidden aria-label="focus point"></button>
        <p class="notice compose-empty" data-preview-empty>drop a photo, then tap the object to focus</p>
      </div>
      <label class="focus-toggle"><input type="checkbox" name="focus_object" data-focus-toggle> focus on object</label>
      <input type="hidden" name="focus_x" value="0.5" data-focus-x>
      <input type="hidden" name="focus_y" value="0.5" data-focus-y>
    </section>
    <button type="submit">post</button>
  </form>
</main>
<script src="/static/compose.js?v=20260527" defer></script>
{{template "foot" .}}
