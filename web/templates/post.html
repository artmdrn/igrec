{{template "head" .}}
<main class="feed">
  <article class="word {{if .Post.HasImage}}word-photo{{end}}">
    <a class="said" href="/@{{.User.Username}}">@{{.User.Username}}</a>
    {{if .Post.HasImage}}
      <a class="photo" href="{{.Post.URL}}">
        <img src="{{.Post.ImageURL.String}}" alt="" style="{{.Post.FocusCSS}}">
        <span class="value caption" style="{{.Post.CaptionCSS}}">{{.Post.Word}}</span>
      </a>
      <time datetime="{{.Post.MachineTime}}">{{.Post.DisplayTime}}</time>
    {{else}}
      <a class="value" href="{{.Post.URL}}">{{.Post.Word}}</a>
      <time datetime="{{.Post.MachineTime}}">{{.Post.DisplayTime}}</time>
    {{end}}
  </article>
  {{if .Echoes}}
    <section class="echoes" aria-label="word echoes">
      <p>echoes</p>
      <div>
        {{range .Echoes}}
          <a href="{{.URL}}">
            <span>@{{.Username}}</span>
            <time datetime="{{.MachineTime}}">{{.DisplayTime}}</time>
          </a>
        {{end}}
      </div>
    </section>
  {{end}}
</main>
{{template "foot" .}}
