{{template "head" .}}
<main class="settings">
  <form method="post" action="/settings">
    {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
    {{if .Notice}}<p class="notice">{{.Notice}}</p>{{end}}
    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
    <label>email <input type="email" name="email" value="{{.User.Email}}" autocomplete="email"></label>
    <label><input type="checkbox" name="daily" {{if .User.EmailOptIn}}checked{{end}}> daily word</label>
    <label>fediverse <input name="fediverse" placeholder="@you@example.social"></label>
    <label>timestamps
      <select name="timestamp_preference">
        <option value="date" {{if eq .User.TimestampPreference "date"}}selected{{end}}>date</option>
        <option value="datetime" {{if eq .User.TimestampPreference "datetime"}}selected{{end}}>date + time</option>
        <option value="smart" {{if eq .User.TimestampPreference "smart"}}selected{{end}}>time if same day repeats</option>
      </select>
    </label>
    <button type="submit">save</button>
    <p class="notice" data-passkey-status>{{.PasskeyCount}} passkeys</p>
    <button type="button" data-passkey="register">add passkey</button>
    <p class="notice">{{.InviteRemaining}} invites left</p>
    {{range .Invites}}
      <p class="notice">{{if .Used}}used {{end}}{{.Link}}</p>
    {{end}}
    {{if gt .InviteRemaining 0}}
      <button type="submit" name="action" value="invite">make invite</button>
    {{end}}
    <a class="button" href="/logout">logout</a>
    <a class="button" href="/settings/export">export</a>
    <button type="button">migrate</button>
    <button type="button" class="danger">delete</button>
  </form>
</main>
{{template "foot" .}}
