{{template "head" .}}
<main class="settings">
  <form method="post" action="/settings">
    <label>email <input type="email" name="email" value="{{.User.Email}}" disabled></label>
    <label><input type="checkbox" name="daily"> daily word</label>
    <label>fediverse <input name="fediverse" placeholder="@you@example.social"></label>
    <label>timestamps
      <select name="timestamp_preference">
        <option value="date" {{if eq .User.TimestampPreference "date"}}selected{{end}}>date</option>
        <option value="datetime" {{if eq .User.TimestampPreference "datetime"}}selected{{end}}>date + time</option>
        <option value="smart" {{if eq .User.TimestampPreference "smart"}}selected{{end}}>time if same day repeats</option>
      </select>
    </label>
    <button type="submit">save</button>
    <a class="button" href="/logout">logout</a>
    <button type="button">export</button>
    <button type="button">migrate</button>
    <button type="button" class="danger">delete</button>
  </form>
</main>
{{template "foot" .}}
