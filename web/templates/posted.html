{{template "head" .}}
<main class="posted">
  <article class="posted-card {{if .Post.HasImage}}posted-photo{{end}}">
    {{if .Post.HasImage}}
      <img src="{{.Post.ImageURL.String}}" alt="">
    {{end}}
    <p class="posted-word {{if .Post.HasImage}}caption{{end}}" {{if .Post.HasImage}}style="{{.Post.CaptionCSS}}"{{end}}>{{.Post.Word}}</p>
    <a class="posted-link" href="{{.PostURL}}">open</a>
  </article>
</main>
{{template "foot" .}}
